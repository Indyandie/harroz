# Hyprland

## Wayland

env = NIXOS_OZONE_WL,1 # Ozone Wayland not working https://discourse.nixos.org/t/electron-apps-work-only-with-disable-gpu/63851
env = GTK_USE_PORTAL,1
env = GDK_BACKEND,wayland
env = QT_QPA_PLATFORM,wayland
env = SDL_VIDEODRIVER,wayland
env = ELECTRON_ENABLE_STACK_DUMPING,true
env = ELECTRON_NO_ATTACH_CONSOLE,true
env = XDG_SESSION_DESKTOP,Hyprland


## Hyprcursor

env = HYPRCURSOR_THEME,rose-pine-gtk
env = HYPRCURSOR_SIZE,18
env = XCURSOR_THEME,BreezeX-RosePine-Linux
env = XCURSOR_SIZE,18

## GTK

env = GDK_BACKEND,wayland,x11,* # GTK: Use wayland if available. If not: try x11, then any other GDK backend.
env = GTK_THEME_VARIANT,dark

### GTK_THEME conflics with nwg_look
# env = GTK_THEME,rose-pine-gtk
# exec-once = dconf write /org/gnome/desktop/interface/gtk-theme "'rose-pine-gtk'"

## QT

### Variables

env = QT_AUTO_SCREEN_SCALE_FACTOR,1 # (From the Qt documentation) enables automatic scaling, based on the monitor’s pixel density
env = QT_QPA_PLATFORM,wayland;xcb # Tell Qt applications to use the Wayland backend, and fall back to X11 if Wayland is unavailable
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1 # Disables window decorations on Qt applications
env = QT_QPA_PLATFORMTHEME,qt5ct # Tells Qt based applications to pick your theme from qt5ct, use with Kvantum.u

## Toolkit

env = SDL_VIDEODRIVER,wayland # Run SDL2 applications on Wayland. Remove or set to x11 if games that provide older versions of SDL cause compatibility issues
env = CLUTTER_BACKEND,wayland # Clutter package already has wayland enabled, this variable will force Clutter applications to try and use the Wayland backend

## XDG

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# kurokula color theme
source = ~/.config/hypr/kurokula.conf

$mainMod = ALT_L
$SHSUP = SHIFT SUPER
$ULTRA = $SHSUP CONTROL

$NOTIF = notify-send
$CP_PNG = wl-copy -t image/png

# HYPRCTL

$ACTIVE_WINDOW = hyprctl activewindow -j | jq -r '"\(.at[0]),\(.at[1]) \(.size[0])x\(.size[1])"'

debug {
    disable_logs = false
}

# xwayland

xwayland {
  force_zero_scaling = true
}

# toolkit-specific scale
env = GDK_SCALE,2
env = XCURSOR_SIZE,18

# SLURP
$SLURP = XCURSOR_SIZE=200 slurp -b $BLACK_DARK60 -s $WHITE_DARK15 -c $WHITE_DARK80 -B $WHITE_DARK35 -w 2 -F monospace -d
$FULL_SLURP = -g "$($SLURP -r -o)"
$SEL_SLURP = -g "$($SLURP)"
$ACT_SLURP = -g "$($ACTIVE_WINDOW | $SLURP -d -r)"

# SHARE
# env = FREE_SOUNDS,$HOME/.local/share/sounds/freedesktop/stereo/
env = FREE_SOUNDS,/run/current-system/sw/share/sounds/freedesktop/stereo/
$CAM_SHUTTER = "${FREE_SOUNDS}camera-shutter.oga"
$SCR_CAP = "${FREE_SOUNDS}screen-capture.oga"
$GTG = "${FREE_SOUNDS}complete.oga"
$VOL_CHANGE = "${FREE_SOUNDS}audio-volume-change.oga"
$BELL = "${FREE_SOUNDS}bell.oga"

#---------------------------------------------------------------------------------------------------

# NIGHTSHIFT
# exec-once = dbus-update-activation-environment --systemd HYPRLAND_INSTANCE_SIGNATURE
# exec = hyprshade auto
exec-once = hyprsunset

# bind = $mainMod SHIFT, N, exec, hyprshade toggle

#---------------------------------------------------------------------------------------------------

# GPU - https://wiki.hypr.land/Configuring/Multi-GPU/

# 00:02.0 VGA compatible controller: Intel Corporation Crystal Well Integrated Graphics Controller (rev 08)
# lrwxrwxrwx 1 root root  8 Jul 20 11:59 pci-0000:00:02.0-card -> ../card1
# lrwxrwxrwx 1 root root 13 Jul 20 11:59 pci-0000:00:02.0-render -> ../renderD128

# 01:00.0 VGA compatible controller: Advanced Micro Devices, Inc. [AMD/ATI] Venus XT [Radeon HD 8870M / R9 M270X/M370X] (rev 83)
# lrwxrwxrwx 1 root root  8 Jul 20 11:59 pci-0000:01:00.0-card -> ../card0
# lrwxrwxrwx 1 root root 13 Jul 20 11:59 pci-0000:01:00.0-render -> ../renderD129

# env = WLR_DRM_DEVICES,/dev/dri/renderD128:/dev/dri/card0
# env = WLR_DRM_DEVICES,/dev/dri/card1:/dev/dri/card0
# env = AQ_DRM_DEVICES,/dev/dri/card0:/dev/dri/card1


# MONITORS

# monitor={Monitor},{position-offset},{?},{scale}
monitor=eDP-1,2880x1800@59.99Hz,0x0,2
# monitor=,preferred,auto,auto

# ## BRIGHTNESS

# bindel = , XF86MonBrightnessUp, exec, brightnessctl -d "acpi_video0" set +5%
# bindel = , XF86MonBrightnessDown, exec, brightnessctl -d "acpi_video0" set 5%-
# bindel = , XF86MonBrightnessUp, exec, brightnessctl -d "acpi_video1" set +5%
# bindel = , XF86MonBrightnessDown, exec, brightnessctl -d "acpi_video1" set 5%-

$BRIGHTNESS_DEVICE = amdgpu_bl1
bindel = , XF86MonBrightnessUp, exec, brightnessctl -d $BRIGHTNESS_DEVICE set +5%
bindel = , XF86MonBrightnessDown, exec, brightnessctl -d $BRIGHTNESS_DEVICE set 5%-

# ## KEYBOARD

bindel = , XF86KbdBrightnessUp, exec, brightnessctl -d "*::kbd_backlight" set +5%
bindel = , XF86KbdBrightnessDown, exec, brightnessctl -d "*::kbd_backlight" set 5%-

# ## SCREENSHOTS

env = PIC_DEFAULT_DIR,$HOME/Pictures/Screenshots
$PLAY_SCR = play $SCR_CAP
$DATE_NOW = $(date +%Y-%m-%dT%H:%M:%S%Z)
$GRM_NAME = $(echo "$DATE_NOW-img.png")
$GRM_OUT = "$PIC_DEFAULT_DIR/$GRM_NAME"
$GRM_NOTI = $PLAY_SCR && $NOTIF -a "grim" "  Screen Capture"
$GRM_CP_NOTI = $CP_PNG && $GRM_NOTI "Screenshot copied to pasteboard"

# ## fullscreen

# bindl = SUPER, 3, exec, grim # Take screenshot of the locked screen
bindl = $SHSUP, 3, exec, TMP_IMG_FULL=$GRM_OUT;grim $FULL_SLURP $TMP_IMG_FULL && $GRM_NOTI "<b>󰊓 Fullscreen:</b> <u>$TMP_IMG_FULL</u>" -i $TMP_IMG_FULL
# copy to clipboard
bind = $ULTRA, 3, exec, grim $FULL_SLURP - | $GRM_CP_NOTI

# ## selection

bind = $SHSUP, 4, exec, TMP_IMG_SEL=$GRM_OUT;grim $SEL_SLURP $TMP_IMG_SEL && $GRM_NOTI "<b>󰒉 Screen selection:</b> <u>$TMP_IMG_SEL</u>" -i $TMP_IMG_SEL
# copy to clipboard
bind = $ULTRA, 4, exec, grim $SEL_SLURP - | $GRM_CP_NOTI

# ## active window

bind = $SHSUP, 5, exec, TMP_IMG_WIN=$GRM_OUT;grim $ACT_SLURP $TMP_IMG_WIN && $GRM_NOTI "<b>󰖯 Active window:</b> <u>$TMP_IMG_WIN</u>" -i $TMP_IMG_WIN
# copy to clipboard
bind = $ULTRA, 5, exec, grim $ACT_SLURP - | $GRM_CP_NOTI

#---------------------------------------------------------------------------------------------------

# VIDEO RECORDING

env = VID_DEFAULT_DIR,$HOME/Videos/Screencasts
$PLAY_GTG = play $GTG
$WFR_NOTI = $PLAY_GTG && $NOTIF -a "wf-recorder" "  Screen Recorder"
$WFR_FL = "$VID_DEFAULT_DIR/$DATE_NOW-vid.mkv"
$WFR = wf-recorder -f
$WFR_CHECK = pgrep wf-recorder
$WFR_KILL = killall -KILL wf-recorder
$WFR_SLURP = $WFR -g "$($SLURP || $WFR_KILL)" # wf-recorder defaulted to full screen without the kill

bind=$SHSUP,6,exec,$WFR $WFR_FL $FULL_SLURP
bind=$SHSUP,7,exec,$WFR $WFR_FL $WFR_SLURP
bindn=,escape,exec,$WFR_CHECK && $WFR_KILL && $WFR_NOTI "Recording saved to <u>$VID_DEFAULT_DIR</u>"

#---------------------------------------------------------------------------------------------------

# STARTUP

exec-once = hyprpaper
exec-once = dunst
exec-once = mullvad connect
exec-once = flatpak run com.dropbox.Client
exec-once = keepassxc
exec-once = sleep 4 && ghostty
exec-once = syncthing

#---------------------------------------------------------------------------------------------------


# Default Workspaces
windowrule = workspace 1, match:class ^(floorp)$
windowrule = workspace 2, match:class ^(Alacritty)$
windowrule = workspace 2, match:class .*(ghostty)$
windowrule = workspace 3, match:class ^((B|b)rave-browser)$
windowrule = workspace 4, match:class ^(obsidian)$
windowrule = workspace 5, match:title ^(Signal)$
windowrule = workspace 5, match:class ^(Proton Mail)$
windowrule = workspace 7, match:title ^(Steam)$
windowrule = workspace 8, match:initial_title .*\[Locked\].*
windowrule = workspace 9, match:class ^(thunar)$
windowrule = workspace 9, match:class ^(com.*Celeste)$
windowrule = float on, match:title ^Rename.*

# Special
windowrule = workspace special:special, match:title ^(Grok)(.*)$

# Floating
windowrule = float on, match:class nm-connection-editor
windowrule = float on, match:class .*(blueman-manager).*

# Focused
windowrule = opacity 1, match:focus true

# KeePassXC Access Request
windowrule = keep_aspect_ratio on, match:title .*Access Request$
windowrule = float on, match:title .*Access Request$
windowrule = size {90% 90%}, match:title .*Access Request$
windowrule = center on, match:title .*Access Request$
windowrule = dim_around on, match:title .*Access Request$
windowrule = workspace 8, match:title KeePassXC, match:float on

# No border when only 1 window on workspace
workspace = w[1], border:false 

# IMAGE/VIDEO PREVIEW
windowrule = float on, match:title (imv|mpv)
windowrule = size 80% 80%, match:title (imv|mpv)
windowrule = border_color rgba($WHITE_DARK44), match:title (imv|mpv)
windowrule = center on, match:title (imv|mpv)

# loupe (image viewer)
windowrule = float on, match:class ^(.*Loupe)$
windowrule = size 80% 80%, match:class ^(.*Loupe)$
windowrule = border_color rgba($WHITE_DARK44), match:class ^(.*Loupe)$
windowrule = center on, match:class ^(.*Loupe)$

# Eye of Gnome (image viewer)
windowrule = float on, match:class eog
windowrule = size 80% 80%, match:class eog
windowrule = border_color rgba($WHITE_LIGHT84), match:class eog
windowrule = center on, match:class eog

# KeePassXC Access Request
windowrule = float on, match:title (KeePassXC -  Access Request)
windowrule = size 50% 80%, match:title (KeePassXC -  Access Request)
windowrule = border_color rgba($WHITE_LIGHT84), match:title (KeePassXC -  Access Request)
windowrule = center on, match:title (KeePassXC -  Access Request)

# picture in picture (PIP)
windowrule = keep_aspect_ratio on, match:title ^((P|p)icture(-| )in(-| )(P|p)icture)$
windowrule = opacity 0.5, match:title ^((P|p)icture(-| )in(-| )(P|p)icture)$
windowrule = size {100 100}, match:title ^((P|p)icture(-| )in(-| )(P|p)icture)$
windowrule = float on, match:title ^((P|p)icture(-| )in(-| )(P|p)icture)$
windowrule = pin on, match:title ^((P|p)icture(-| )in(-| )(P|p)icture)$
windowrule = move {0 0}, match:title ^((P|p)icture(-| )in(-| )(P|p)icture)$
windowrule = border_size 0, match:title ^((P|p)icture(-| )in(-| )(P|p)icture)$
windowrule = no_initial_focus true, match:title ^((P|p)icture(-| )in(-| )(P|p)icture)$

# modal dialogs
windowrule = float on, match:class xdg-desktop-portal-gtk

# steam
windowrule = border_size 0, match:class ^(steam)$

#---------------------------------------------------------------------------------------------------

# LOCK/SLEEP

exec-once=hypridle
bind = SHIFT SUPER, L, exec, hyprlock

#---------------------------------------------------------------------------------------------------

# ## clipboard - cliphist
exec-once=wl-paste --type text --watch cliphist store #Stores only text data
exec-once=wl-paste --type image --watch cliphist store #Stores only image data

input {
    # kb_model =
    kb_layout = us
    # kb_variant =
    # set compose key right alt/opt
    kb_options=compose:ralt,level3:ralt_switch
    # kb_rules =
    # kb_file =
    # numlock_by_default = false
    repeat_rate	= 25
    repeat_delay = 500

    # mouse
    sensitivity = 0.0
    # accel_profile =
    # scroll_points = # accel_profile = custom
    force_no_accel = false
    left_handed = false
    scroll_method = 2fg
    scroll_button = 0
    scroll_button_lock = 0
    natural_scroll = true
    follow_mouse = 1
    mouse_refocus = true
    float_switch_override_focus = 1

    touchpad {
        disable_while_typing = false
        natural_scroll = true
        scroll_factor = 1.0
        middle_button_emulation = false
        # tap_button_map =
        clickfinger_behavior = true
        tap-to-click = true
        drag_lock = false
        tap-and-drag = false
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

general {
    layout = master
    gaps_in = 8
    gaps_out = 8
    border_size = 2
    col.active_border = rgba($RED_LIGHTdd) rgba($RED_NORMALcc) rgba($RED_DARKaa) 25deg
    col.inactive_border = rgba($WHITE_DARK33)
}

windowrule = match:float on, border_size 0

decoration {
    rounding = 0
    active_opacity = 1.0
    inactive_opacity = 0.9
    fullscreen_opacity = 0.95
    dim_inactive = true
    dim_strength = 0.1
    dim_around = 0.7
    dim_special = 0.01

    blur {
        enabled = true
        size = 5
        passes = 3
        ignore_opacity = false
        new_optimizations = true
        xray = false
        noise = 0.0117
        contrast = 0.8916
        brightness = 0.8172
        vibrancy = 0.1696
        vibrancy_darkness = 0.0
        special = true
    }

    shadow {
        enabled = true
        range = 7
        render_power = 4
        color = rgba($BLACK_DARKff)
        scale = 1.0
    }
}

animations {
    enabled = false
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsIn, 1, 7, default, popin 80%
    animation = windowsOut, 1, 3, default, popin 20%
    animation = border, 1, 20, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 5, default
    animation = workspaces, 1, 6, default, slidefade
}

dwindle {
    preserve_split = yes # you probably want this
    special_scale_factor = 1.0 # fix: correct special windowrules
}

master {
    new_on_top = true
    mfact = 0.55
    special_scale_factor = 0.9
    special_scale_factor = 1.0 # fix: correct special windowrules
}

gestures {
    workspace_swipe_distance = 50
}

gesture = 4, horizontal, workspace
gesture = 4, vertical, dispatcher, togglespecialworkspace

# Example per-device config
# device:epic mouse V1 {
    # error: spceial category's first value must be the key, key for <device> is <name>
    # sensitivity = -0.5
# }

cursor {
    zoom_factor = 1.0
    zoom_rigid = true
    hide_on_key_press = true
}

$ZOOM_IN = exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/^float.*/ {print $2 * 1.1}')
$ZOOM_OUT = exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/^float.*/ {print $2 * 0.9}')
$ZOOM_FIT = exec, hyprctl -q keyword cursor:zoom_factor 1

binde = SUPER SHIFT, equal, $ZOOM_IN
binde = SUPER SHIFT, minus, $ZOOM_OUT
bind = SUPER SHIFT, 0, $ZOOM_FIT

bind = SUPER SHIFT, mouse_up, $ZOOM_IN
bind = SUPER SHIFT, mouse_down, $ZOOM_OUT

gesture = 2, up, mod: SUPER SHIFT, dispatcher, $ZOOM_IN
gesture = 2, pinchout, mod: SUPER SHIFT, dispatcher, $ZOOM_IN
gesture = 2, pinchin, mod: SUPER SHIFT, dispatcher, $ZOOM_OUT
gesture = 3, pinch, mod: SUPER SHIFT, dispatcher, $ZOOM_FIT

# Misc
misc {
    disable_hyprland_logo = true
    exit_window_retains_fullscreen = true
    enable_swallow = true
    swallow_regex = ^(Alacritty)$
    exit_window_retains_fullscreen = true
    on_focus_under_fullscreen = 1
}



# ------------------------------------------------------------------------------------

# Launcher & dmenu

# windowrule = stayfocused, match:class (wofi|rofi)
windowrule = border_size 0, match:class (wofi|rofi)

# ROFI

bind = $mainMod, space, exec, rofi -show drun
bind = CTRL $mainMod, space, exec, rofi -show run -config ~/.config/rofi/config-run.rasi

# CLIPBOARD - cliphist

bind = SUPER, V, exec, cliphist list | rofi -dmenu --pre-display-cmd "echo '%s' | cut -f 2" | cliphist decode | wl-copy

# ## Bemoji 😊

env = BEMOJI_PICKER_CMD,rofi -dmenu -config ~/.config/rofi/emoji-grid.rasi
bind = SHIFT $mainMod, e, exec, bemoji -t -c -n

# WOFI

# bind = $mainMod, space, exec, wofi -S drun --normal-window
# bind = CTRL $mainMod, space, exec, wofi -S run -f --normal-window

# CLIPBOARD - cliphist
# bind = SUPER, V, exec, cliphist list | wofi --normal-window --dmenu --pre-display-cmd "echo '%s' | cut -f 2" | cliphist decode | wl-copy

# -----------------------------------------------------------------------------------

# BINDS

binds {
    allow_workspace_cycles = true
    focus_preferred_method = 1
}

# CUSTOM BINDS

bind = $mainMod SHIFT, T, exec, alacritty
bind = $mainMod SHIFT, Q, exec, hyprctl dispatch exit
bind = $mainMod SHIFT, C, exec, hyprpicker -a
bind = CTRL, Q, killactive,
bind = $mainMod CTRL, Q, exit,
bind = $mainMod, E, exec, dolphin
bind = $mainMod SHIFT, F, fullscreen 
bind = SUPER, F, togglefloating 
bind = $mainMod, F, fullscreenstate, 0 3 # toggle pseudo fullscreen

# SPECIAL WORKSPACES

# Minimize

bind = SUPER, M, exec, hyprctl dispatch movetoworkspace special && hyprctl dispatch togglespecialworkspace
bind = SUPER CTRL, M, movetoworkspace,e+0
bindr = SUPER CTRL, M, togglespecialworkspace,
bind = SUPER, up, togglespecialworkspace,
bindn = SUPER, escape, exec, hyprctl activewindow -j | rg '"name": "special:special"' && hyprctl dispatch togglespecialworkspace
bezier=overshot,0.05,0.9,0.1,1.2
animation=specialWorkspace,1,4,overshot,slidefadevert

workspace = special:special, bordersize:4, gapsin:4, gapsout:36 

# -----------------------------------------------------------------------------------


# LAYOUTS

# ## Master Layout

bind = $mainMod SHIFT, M, layoutmsg, focusmaster master # master
bind = $mainMod SHIFT, return, layoutmsg, swapwithmaster # master
bind = $mainMod SHIFT, space, layoutmsg, orientationnext # master

# ## Dwindle

# bind = $mainMod, P, pseudo, # dwindle
# bind = $mainMod, J, togglesplit, # dwindle

# ------------------------------------------------------------------------------------------


# WINDOW

# ## Move window focus

bind = $mainMod SUPER, l, movefocus, r
bind = $mainMod SUPER, h, movefocus, l
bind = $mainMod SUPER, k, movefocus, u
bind = $mainMod SUPER, j, movefocus, d

# ## Cycle window focus

bind = $mainMod SHIFT, J, cyclenext
bind = $mainMod SHIFT, K, cyclenext, prev

# ## Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# ## Resize active window

bind = $mainMod SHIFT, right, resizeactive, 40 0
bind = $mainMod SHIFT, left, resizeactive, -40 0
bind = $mainMod SHIFT, up, resizeactive, 0 -10
bind = $mainMod SHIFT, down, resizeactive, 0 10

# ## Move workspaces

bind = $mainMod SHIFT, L, workspace, +1
bind = $mainMod SHIFT, H, workspace, -1

# ## Switch workspaces [0-9]

bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10


# Scroll through existing workspaces with mainMod + scroll
# bind = $mainMod, mouse_down, workspace, e+1
# bind = $mainMod, mouse_up, workspace, e-1

# ## Move/resize windows with mainMod + LMB/RMB and dragging

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ------------------------------------------------------------------------------------

# VOLUME

$PLAY_VOL = play $VOL_CHANGE
$PLAY_BEL = play $BELL
$PLAY_BEL_REV = play $BELL reverse

bindeln = , XF86AudioRaiseVolume, exec, pamixer -i 5 && $PLAY_VOL
bindeln = , XF86AudioLowerVolume, exec, pamixer -d 5 && $PLAY_VOL
bindeln = , XF86AudioMute, exec, $PLAY_BEL_REV && pamixer -t && $PLAY_BEL
bindeln = SHIFT , XF86AudioMicMute, exec, pamixer --default-source -m

# MEDIA

bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioPause, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous

# ------------------------------------------------------------------------------------

# hyprshell

env = HYPRSHELL_NO_USE_PLUGIN,true
# exec-once = hyprshell run &

# eww
source = ~/.config/hypr/hypreww.conf
